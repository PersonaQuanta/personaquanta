<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PersonaQuanta · CRM</title>
<style>
:root{--bg:#06090F;--card:#0D1825;--card2:#111E2D;--card3:#0A1218;--border:#1E3048;--border2:#243850;--accent:#2AA7FF;--accent2:#00D9AE;--accent3:#FFB547;--red:#FF4757;--text:#E8EEFF;--muted:#7A9AB8;--muted2:#3A5470}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden}
body{font-family:'Segoe UI',system-ui,sans-serif;background:var(--bg);color:var(--text);display:flex;flex-direction:column}

/* TOPBAR */
.topbar{display:flex;align-items:center;gap:12px;padding:10px 20px;border-bottom:1px solid var(--border);flex-shrink:0;background:var(--card3)}
.logo{font-weight:700;font-size:14px}.logo span{color:var(--accent)}
.topbar-meta{font-size:10px;color:var(--muted2);font-family:monospace}
.topbar-right{margin-left:auto;display:flex;gap:8px}
.tbtn{font-size:11px;font-family:monospace;padding:5px 12px;border-radius:6px;border:1px solid var(--border);background:transparent;color:var(--muted);cursor:pointer;transition:all .15s}
.tbtn:hover{border-color:var(--accent);color:var(--accent)}
.tbtn.primary{border-color:rgba(0,217,174,.35);color:var(--accent2);background:rgba(0,217,174,.08)}
.tbtn.primary:hover{background:rgba(0,217,174,.15)}

/* LAYOUT */
.layout{display:flex;flex:1;overflow:hidden}

/* SIDEBAR */
.sidebar{width:240px;flex-shrink:0;border-right:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden;background:var(--card3)}
.sidebar-stats{padding:10px 12px;border-bottom:1px solid var(--border);display:grid;grid-template-columns:1fr 1fr;gap:5px}
.sstat{background:var(--card);border:1px solid var(--border);border-radius:7px;padding:7px 9px;cursor:pointer;transition:border-color .15s}
.sstat:hover{border-color:var(--accent2)}
.sstat-val{font-size:18px;font-weight:700;line-height:1}
.sstat-lbl{font-size:9px;color:var(--muted2);font-family:monospace;margin-top:2px}
.search-wrap{padding:7px 10px;border-bottom:1px solid var(--border)}
.search-wrap input{width:100%;background:var(--card);border:1px solid var(--border);color:var(--text);font-size:12px;padding:6px 9px;border-radius:6px;outline:none}
.search-wrap input:focus{border-color:var(--accent)}
.search-wrap input::placeholder{color:var(--muted2)}
.sidebar-filters{padding:7px 9px;border-bottom:1px solid var(--border);display:flex;flex-direction:column;gap:2px}
.fb{font-size:11px;font-family:monospace;padding:5px 8px;border-radius:5px;border:1px solid transparent;background:transparent;color:var(--muted);cursor:pointer;text-align:left;transition:all .15s;display:flex;justify-content:space-between}
.fb:hover{background:var(--card);color:var(--text)}
.fb.active{background:rgba(42,167,255,.1);border-color:rgba(42,167,255,.2);color:var(--accent)}
.fc{font-size:9px;opacity:.55}
.contact-list{flex:1;overflow-y:auto;padding:5px}
.contact-list::-webkit-scrollbar{width:3px}
.contact-list::-webkit-scrollbar-thumb{background:var(--border)}
.ci{padding:8px 9px;border-radius:7px;cursor:pointer;margin-bottom:2px;border:1px solid transparent;transition:all .15s}
.ci:hover{background:var(--card);border-color:var(--border)}
.ci.sel{background:rgba(42,167,255,.07);border-color:rgba(42,167,255,.25)}
.ci-name{font-size:12px;font-weight:600;margin-bottom:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ci-co{font-size:10px;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ci-bot{display:flex;align-items:center;justify-content:space-between;margin-top:3px}
.ci-date{font-size:9px;color:var(--muted2);font-family:monospace}

/* BADGES */
.badge{display:inline-block;font-size:9px;font-family:monospace;padding:2px 6px;border-radius:20px;font-weight:600;white-space:nowrap}
.b-new{background:rgba(0,217,174,.12);color:var(--accent2);border:1px solid rgba(0,217,174,.2)}
.b-sent{background:rgba(42,167,255,.12);color:var(--accent);border:1px solid rgba(42,167,255,.2)}
.b-replied{background:rgba(0,217,174,.12);color:var(--accent2);border:1px solid rgba(0,217,174,.2)}
.b-hot{background:rgba(255,181,71,.15);color:var(--accent3);border:1px solid rgba(255,181,71,.25)}
.b-declined{background:rgba(255,71,87,.1);color:var(--red);border:1px solid rgba(255,71,87,.2)}
.b-followup{background:rgba(140,160,255,.1);color:#8CA0FF;border:1px solid rgba(140,160,255,.2)}
.b-closed{background:rgba(58,84,112,.2);color:var(--muted2);border:1px solid var(--border)}

/* MAIN */
.main{flex:1;display:flex;flex-direction:column;overflow:hidden}
.main-empty{flex:1;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:12px;color:var(--muted2)}
.main-empty .ico{font-size:32px;opacity:.2}

/* ── PASTE PANEL (new contact flow) ── */
.paste-panel{flex:1;display:flex;flex-direction:column;padding:24px;gap:16px;overflow-y:auto}
.paste-panel::-webkit-scrollbar{width:4px}
.paste-panel::-webkit-scrollbar-thumb{background:var(--border)}
.paste-title{font-size:16px;font-weight:700;margin-bottom:2px}
.paste-sub{font-size:12px;color:var(--muted)}
.paste-area{width:100%;min-height:160px;background:var(--card);border:1px solid var(--border2);border-radius:10px;padding:14px;font-size:12px;color:var(--text);font-family:inherit;outline:none;resize:vertical;line-height:1.6;transition:border-color .15s}
.paste-area:focus{border-color:var(--accent2)}
.paste-area::placeholder{color:var(--muted2)}
.btn-analyze{padding:11px 20px;background:rgba(0,217,174,.12);border:1px solid rgba(0,217,174,.3);color:var(--accent2);font-size:13px;font-weight:700;font-family:monospace;border-radius:8px;cursor:pointer;transition:all .15s;display:flex;align-items:center;gap:8px;justify-content:center}
.btn-analyze:hover{background:rgba(0,217,174,.2)}
.btn-analyze:disabled{opacity:.4;cursor:not-allowed}

/* ── RESULTS PANEL ── */
.results-panel{flex:1;display:flex;flex-direction:column;overflow:hidden}
.rp-header{padding:16px 20px;border-bottom:1px solid var(--border);flex-shrink:0;display:flex;align-items:flex-start;gap:16px}
.rp-name{font-size:18px;font-weight:700}
.rp-co{font-size:12px;color:var(--muted);margin-top:2px}
.rp-fit{font-size:11px;font-family:monospace;padding:3px 10px;border-radius:20px;background:rgba(255,181,71,.12);color:var(--accent3);border:1px solid rgba(255,181,71,.25);white-space:nowrap;margin-top:2px;display:inline-block}
.rp-meta{margin-left:auto;display:flex;flex-direction:column;align-items:flex-end;gap:6px}
.rp-body{display:flex;flex:1;overflow:hidden}

/* LEFT — contact info */
.rp-left{width:280px;flex-shrink:0;border-right:1px solid var(--border);padding:16px;overflow-y:auto;display:flex;flex-direction:column;gap:12px}
.rp-left::-webkit-scrollbar{width:3px}
.rp-left::-webkit-scrollbar-thumb{background:var(--border)}
.fl{display:flex;flex-direction:column;gap:4px}
.fl label{font-size:10px;color:var(--muted2);font-family:monospace;letter-spacing:.05em}
.fl input,.fl select,.fl textarea{background:var(--card);border:1px solid var(--border);color:var(--text);font-size:12px;padding:7px 9px;border-radius:6px;outline:none;font-family:inherit}
.fl input:focus,.fl select:focus,.fl textarea:focus{border-color:var(--accent)}
.fl textarea{resize:vertical}
.fl input::placeholder{color:var(--muted2)}

/* RIGHT — messages */
.rp-right{flex:1;display:flex;flex-direction:column;overflow:hidden}
.msg-tabs{display:flex;border-bottom:1px solid var(--border);flex-shrink:0}
.mtab{flex:1;font-size:11px;font-family:monospace;padding:9px 6px;border:none;background:transparent;color:var(--muted);cursor:pointer;border-bottom:2px solid transparent;transition:all .15s}
.mtab:hover{color:var(--text)}
.mtab.active{color:var(--accent);border-bottom-color:var(--accent);background:rgba(42,167,255,.04)}
.msg-body{flex:1;padding:16px;overflow-y:auto;display:flex;flex-direction:column;gap:10px}
.msg-body::-webkit-scrollbar{width:3px}
.msg-body::-webkit-scrollbar-thumb{background:var(--border)}
.mf{display:flex;flex-direction:column;gap:4px}
.mf label{font-size:10px;color:var(--muted2);font-family:monospace;letter-spacing:.05em}
.mf input,.mf textarea{background:var(--card2);border:1px solid var(--border);color:var(--text);font-size:12px;padding:8px 10px;border-radius:6px;outline:none;font-family:inherit;line-height:1.6}
.mf input:focus,.mf textarea:focus{border-color:var(--accent)}
.mf input::placeholder,.mf textarea::placeholder{color:var(--muted2)}
.char-count{font-size:10px;font-family:monospace;text-align:right;margin-top:2px}
.char-ok{color:var(--accent2)}.char-warn{color:var(--accent3)}.char-over{color:var(--red)}
.msg-footer{padding:12px 16px;border-top:1px solid var(--border);display:flex;gap:8px;flex-shrink:0}
.btn-send-dm{flex:1;padding:9px;background:rgba(0,217,174,.1);border:1px solid rgba(0,217,174,.25);color:var(--accent2);font-size:12px;font-weight:700;font-family:monospace;border-radius:7px;cursor:pointer;transition:all .15s}
.btn-send-dm:hover{background:rgba(0,217,174,.2)}
.btn-send-email{flex:1;padding:9px;background:rgba(42,167,255,.1);border:1px solid rgba(42,167,255,.25);color:var(--accent);font-size:12px;font-weight:700;font-family:monospace;border-radius:7px;cursor:pointer;transition:all .15s}
.btn-send-email:hover{background:rgba(42,167,255,.2)}
.btn-save{padding:9px 16px;background:transparent;border:1px solid var(--border);color:var(--muted);font-size:12px;font-family:monospace;border-radius:7px;cursor:pointer;transition:all .15s}
.btn-save:hover{border-color:var(--accent3);color:var(--accent3)}
.btn-send-dm:disabled,.btn-send-email:disabled,.btn-save:disabled{opacity:.4;cursor:not-allowed}

/* DETAIL VIEW */
.detail{flex:1;overflow:hidden;display:flex;flex-direction:column}
.dh{padding:14px 18px 12px;border-bottom:1px solid var(--border);flex-shrink:0}
.dh-name{font-size:17px;font-weight:700;margin-bottom:2px}
.dh-co{font-size:12px;color:var(--muted);margin-bottom:8px}
.dh-meta{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
.durl{font-size:11px;color:var(--accent);font-family:monospace;text-decoration:none}
.durl:hover{text-decoration:underline}
.dbody{display:flex;flex:1;overflow:hidden}
.dleft{width:260px;flex-shrink:0;border-right:1px solid var(--border);padding:14px;overflow-y:auto;display:flex;flex-direction:column;gap:10px}
.dleft::-webkit-scrollbar{width:3px}
.dleft::-webkit-scrollbar-thumb{background:var(--border)}
.dright{flex:1;display:flex;flex-direction:column;overflow:hidden}
.log-list{display:flex;flex-direction:column;gap:4px}
.log-item{background:var(--card);border:1px solid var(--border);border-radius:6px;padding:7px 9px}
.log-d{font-size:9px;color:var(--muted2);font-family:monospace;margin-bottom:2px}
.log-t{font-size:11px;color:var(--muted)}
.log-t.hot{color:var(--accent3)}.log-t.replied{color:var(--accent2)}.log-t.sent{color:var(--accent)}

/* SPINNER */
.spinner{display:inline-block;width:13px;height:13px;border:2px solid rgba(0,217,174,.3);border-top-color:var(--accent2);border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

/* TOAST */
.toast{position:fixed;bottom:18px;right:18px;padding:9px 14px;border-radius:8px;font-size:11px;font-family:monospace;z-index:999;transition:opacity .3s;pointer-events:none}
.toast.success{background:rgba(0,217,174,.15);border:1px solid rgba(0,217,174,.4);color:var(--accent2)}
.toast.error{background:rgba(255,71,87,.1);border:1px solid rgba(255,71,87,.3);color:var(--red)}
.toast.info{background:rgba(42,167,255,.12);border:1px solid rgba(42,167,255,.3);color:var(--accent)}

/* MODAL */
.mo{position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:100;display:flex;align-items:center;justify-content:center;padding:20px}
.modal{background:var(--card);border:1px solid var(--border2);border-radius:12px;padding:22px;width:100%;max-width:400px;display:flex;flex-direction:column;gap:12px}
.modal h3{font-size:14px;font-weight:700}
.mf2{display:flex;flex-direction:column;gap:4px}
.mf2 label{font-size:10px;color:var(--muted2);font-family:monospace;letter-spacing:.05em}
.mf2 input{background:var(--card2);border:1px solid var(--border);color:var(--text);font-size:12px;padding:7px 9px;border-radius:6px;outline:none;font-family:monospace}
.mf2 input:focus{border-color:var(--accent)}
.chi{font-size:10px;color:var(--muted2);margin-top:2px}
.ma{display:flex;gap:8px;justify-content:flex-end;margin-top:4px}
.bcn{padding:7px 14px;border-radius:6px;border:1px solid var(--border);background:transparent;color:var(--muted);font-size:12px;cursor:pointer}
.bco{padding:7px 14px;border-radius:6px;border:1px solid rgba(42,167,255,.35);background:rgba(42,167,255,.1);color:var(--accent);font-size:12px;font-weight:600;cursor:pointer}
.bco:hover{background:rgba(42,167,255,.2)}

.analysis-note{font-size:11px;color:var(--muted2);padding:10px 12px;background:var(--card);border:1px solid var(--border);border-radius:7px;line-height:1.6}
</style>
</head>
<body>

<div class="topbar">
  <div class="logo">PersonaQuanta <span>·</span> CRM</div>
  <div class="topbar-meta">INVESTOR OUTREACH · 2026</div>
  <div class="topbar-right">
    <button class="tbtn" id="btn-cfg">⚙ Settings</button>
    <button class="tbtn primary" id="btn-new">+ New Contact</button>
  </div>
</div>

<div class="layout">
  <!-- SIDEBAR -->
  <div class="sidebar">
    <div class="sidebar-stats">
      <div class="sstat"><div class="sstat-val" id="s-total" style="color:var(--text)">0</div><div class="sstat-lbl">TOTAL</div></div>
      <div class="sstat"><div class="sstat-val" id="s-hot" style="color:var(--accent3)">0</div><div class="sstat-lbl">HOT</div></div>
      <div class="sstat"><div class="sstat-val" id="s-replied" style="color:var(--accent2)">0</div><div class="sstat-lbl">REPLIED</div></div>
      <div class="sstat"><div class="sstat-val" id="s-fw" style="color:#8CA0FF">0</div><div class="sstat-lbl">FOLLOW-UP</div></div>
    </div>
    <div class="search-wrap"><input type="text" placeholder="Search..." oninput="renderList()" id="search"></div>
    <div class="sidebar-filters">
      <button class="fb active" id="fb-all"      onclick="setFilter('all')">All <span class="fc" id="fc-all"></span></button>
      <button class="fb"        id="fb-hot"      onclick="setFilter('hot')">🔥 Hot <span class="fc" id="fc-hot"></span></button>
      <button class="fb"        id="fb-sent"     onclick="setFilter('sent')">Sent <span class="fc" id="fc-sent"></span></button>
      <button class="fb"        id="fb-replied"  onclick="setFilter('replied')">Replied <span class="fc" id="fc-replied"></span></button>
      <button class="fb"        id="fb-followup" onclick="setFilter('followup')">Follow-up <span class="fc" id="fc-followup"></span></button>
      <button class="fb"        id="fb-declined" onclick="setFilter('declined')">Declined <span class="fc" id="fc-declined"></span></button>
    </div>
    <div class="contact-list" id="clist"></div>
  </div>

  <!-- MAIN -->
  <div class="main" id="main">
    <div class="main-empty">
      <div class="ico">◈</div>
      <p style="font-size:13px;margin-bottom:4px">Paste a LinkedIn profile to start</p>
      <p style="font-size:11px">Click <b style="color:var(--accent2)">+ New Contact</b> above</p>
    </div>
  </div>
</div>

<!-- CONFIG MODAL -->
<div class="mo" id="cfg-mo" style="display:none">
  <div class="modal">
    <h3>⚙ Settings</h3>
    <div class="mf2"><label>ANTHROPIC API KEY</label><input id="cfg-c" type="password" placeholder="sk-ant-..."><div class="chi">Analyzes profiles + generates messages</div></div>
    <div class="mf2"><label>RESEND API KEY</label><input id="cfg-r" type="password" placeholder="re_..."><div class="chi">Sends emails via <a href="/cdn-cgi/l/email-protection" class="__cf_email__" data-cfemail="ec8489808083ac9c899e9f83828d9d998d82988dc2838280858289">[email&#160;protected]</a></div></div>
    <div class="mf2"><label>FROM EMAIL</label><input id="cfg-f" placeholder="hello@personaquanta.online"></div>
    <div class="ma"><button class="bcn" onclick="closeCfg()">Cancel</button><button class="bco" onclick="saveCfg()">Save</button></div>
  </div>
</div>

<div class="toast" id="toast" style="opacity:0"></div>

<script data-cfasync="false" src="/cdn-cgi/scripts/5c5dd728/cloudflare-static/email-decode.min.js"></script><script>
(function(){
window._crm={};
const ST={new:{l:'New',c:'b-new'},sent:{l:'Sent',c:'b-sent'},replied:{l:'Replied',c:'b-replied'},hot:{l:'🔥 Hot',c:'b-hot'},declined:{l:'Declined',c:'b-declined'},followup:{l:'Follow-up',c:'b-followup'},closed:{l:'Closed',c:'b-closed'}};

// Seed data — existing contacts
const SEED=[
  {n:'Frank Tornatore',co:'cryptoventures.co.uk · CEO',st:'hot',em:'frank.tornatore@gmail.com',url:'',nt:'Deck sent 18 Mar',fit:91,dt:'2026-03-18',log:[{d:'2026-03-18',t:'Deck sent to frank.tornatore@gmail.com',s:'sent'}]},
  {n:'Bas Godska',co:'Acrobator Ventures · Founder',st:'sent',em:'',url:'',nt:'500+ deals, early Miro investor, NL4UA co-founder',fit:95,dt:'2026-03-18',log:[]},
  {n:'Katya Kohen',co:'Stifel Financial · MD Venture',st:'sent',em:'',url:'',nt:'',fit:92,dt:'2026-03-18',log:[]},
  {n:'Kirill Bondar PhD',co:'Ukraine Phoenix Tech Fund · Partner',st:'sent',em:'',url:'',nt:'Follow up in Ukrainian',fit:90,dt:'2026-03-18',log:[]},
  {n:'Miriam Erlich',co:'High House Investments · Head',st:'sent',em:'',url:'',nt:'',fit:89,dt:'2026-03-18',log:[]},
  {n:'Luka Tomljenovic',co:'Early-stage · Aerospace',st:'declined',em:'',url:'',nt:'Off-strategy',fit:34,dt:'2026-03-18',log:[{d:'2026-03-18',t:'Declined: off-strategy',s:'declined'}]},
  {n:'Kateryna TRYFONOVA',co:'Angel Investor · Impact',st:'declined',em:'',url:'',nt:'Fintech not her theme',fit:40,dt:'2026-03-18',log:[{d:'2026-03-18',t:'Declined: fintech not her theme',s:'declined'}]},
  {n:'Allan Rosen',co:'Investment Banker',st:'replied',em:'',url:'',nt:'Advised to target VCs/angels',fit:35,dt:'2026-03-18',log:[{d:'2026-03-18',t:'Replied: advised to target VCs/angels',s:'replied'}]},
];

let contacts=[], activeFilter='all', selectedId=null, currentDraft=null;

window.load = function load(){const s=localStorage.getItem('pq_crm5');contacts=s?JSON.parse(s):SEED.map((c,i)=>({...c,id:Date.now()+i,log:c.log||[]}));renderAll()}
window.save = function save(){localStorage.setItem('pq_crm5',JSON.stringify(contacts))}
window.getFiltered = function getFiltered(){const q=document.getElementById('search').value.toLowerCase();return contacts.filter(c=>{if(activeFilter!=='all'&&c.st!==activeFilter)return false;if(q&&!`${c.n} ${c.co} ${c.nt} ${c.em}`.toLowerCase().includes(q))return false;return true})}
window.setFilter = function setFilter(f){activeFilter=f;document.querySelectorAll('.fb').forEach(b=>b.classList.remove('active'));const b=document.getElementById(`fb-${f}`);if(b)b.classList.add('active');renderList()}
window.renderAll = function renderAll(){updateStats();renderList()}
window.updateStats = function updateStats(){
  document.getElementById('s-total').textContent=contacts.length;
  document.getElementById('s-hot').textContent=contacts.filter(c=>c.st==='hot').length;
  document.getElementById('s-replied').textContent=contacts.filter(c=>c.st==='replied').length;
  document.getElementById('s-fw').textContent=contacts.filter(c=>c.st==='followup').length;
  ['all','hot','sent','replied','followup','declined'].forEach(f=>{const e=document.getElementById(`fc-${f}`);if(e)e.textContent=f==='all'?contacts.length:contacts.filter(c=>c.st===f).length});
}
window.renderList = function renderList(){
  updateStats();
  document.getElementById('clist').innerHTML=getFiltered().map(c=>{const s=ST[c.st]||ST.sent;return`<div class="ci${c.id===selectedId?' sel':''}" onclick="selContact(${c.id})"><div class="ci-name">${c.n}${c.fit?` <span style="font-size:9px;color:var(--muted2)">${c.fit}</span>`:''}</div><div class="ci-co">${c.co||'—'}</div><div class="ci-bot"><span class="badge ${s.c}">${s.l}</span><span class="ci-date">${c.dt||''}</span></div></div>`}).join('')
}

// ── PASTE PANEL ──────────────────────────────────────────────────────────────
window.showPastePanel = function showPastePanel(){
  selectedId=null;renderList();
  document.getElementById('main').innerHTML=`
  <div class="paste-panel">
    <div>
      <div class="paste-title">+ New Contact</div>
      <div class="paste-sub">Paste LinkedIn profile text — Claude will extract all info and generate DM + Email automatically</div>
    </div>
    <textarea class="paste-area" id="profile-paste" placeholder="Paste the full LinkedIn profile text here...&#10;&#10;Include: name, headline, about section, experience, location — the more the better.&#10;&#10;Claude will automatically extract:&#10;• Name, company, role&#10;• Fit score (0-100)&#10;• Investment angle&#10;• Generate personalized DM (LinkedIn, ≤300 chars)&#10;• Generate personalized Email"></textarea>
    <button class="btn-analyze" id="btn-analyze" onclick="analyzeProfile()">

PRODUCT CONTEXT:

70-89: Angel investor or VC, any tech focus  
50-69: Entrepreneur with capital, financial background

EMAIL RULES:

window.dmTabHtml = function dmTabHtml(p){
  const dmLen=(p||currentDraft||{}).dm?.length||0;
  const dm=(p||currentDraft||{}).dm||'';
  const col=dmLen<=280?'var(--accent2)':dmLen<=300?'var(--accent3)':'var(--red)';
  return`<div class="mf">
    <label>LINKEDIN DM <span style="font-size:9px;color:var(--muted2)">(MAX 300 CHARS)</span></label>
    <textarea id="dm-text" rows="6" oninput="updateCharCount()" style="min-height:120px">${dm}</textarea>
    <div class="char-count" id="char-count" style="color:${col}">${dmLen} / 300 characters</div>
  </div>
  <div style="font-size:11px;color:var(--muted2);padding:8px 10px;background:var(--card);border-radius:6px;border:1px solid var(--border)">
    💡 Copy this DM and paste it directly into LinkedIn messaging. Keep it under 300 chars for connection requests.
  </div>`;
}

window.emailTabHtml = function emailTabHtml(p){
  const d=p||currentDraft||{};
  return`<div class="mf"><label>TO</label><input id="email-to" value="${d.email||''}" placeholder="recipient@email.com"></div>
  <div class="mf"><label>SUBJECT</label><input id="email-subj" value="${d.email_subject||''}"></div>
  <div class="mf"><label>BODY</label><textarea id="email-body" rows="12" style="min-height:180px">${d.email_body||''}</textarea></div>`;
}

window.swMsgTab = function swMsgTab(tab){
  ['dm','email'].forEach(t=>{const e=document.getElementById(`mt-${t}`);if(e)e.classList.toggle('active',t===tab)});
  const mc=document.getElementById('msg-content');if(!mc)return;
  const bsdm=document.getElementById('bsdm');
  const bsemail=document.getElementById('bsemail');
  if(tab==='dm'){
    mc.innerHTML=dmTabHtml(currentDraft);
    if(bsdm){bsdm.textContent='📋 Copy DM';bsdm.onclick=copyDM}
    if(bsemail){bsemail.style.display=''}
    updateCharCount();
  }else{
    mc.innerHTML=emailTabHtml(currentDraft);
    if(bsdm){bsdm.textContent='📋 Copy Email';bsdm.onclick=()=>{const b=document.getElementById('email-body');if(b){navigator.clipboard.writeText(b.value);toast('Copied ✓','success')}}}
    if(bsemail){bsemail.style.display=''}
  }
}

window.updateCharCount = function updateCharCount(){
  const ta=document.getElementById('dm-text');
  const cc=document.getElementById('char-count');
  if(!ta||!cc)return;
  const len=ta.value.length;
  const col=len<=280?'var(--accent2)':len<=300?'var(--accent3)':'var(--red)';
  cc.textContent=`${len} / 300 characters`;
  cc.style.color=col;
}

window.copyDM = function copyDM(){
  const ta=document.getElementById('dm-text');
  if(!ta)return;
  if(ta.value.length>300){toast(`DM is ${ta.value.length} chars — trim to 300 first`,'error');return}
  navigator.clipboard.writeText(ta.value).then(()=>{
    toast('DM copied to clipboard ✓','success');
    // Auto-save with status sent
    if(currentDraft)currentDraft._dmSent=true;
  });
}

async window.sendEmail = function sendEmail(){
  const rk=localStorage.getItem('pq_resend');
  if(!rk){toast('Add Resend API key in Settings','error');openConfig();return}
  // Check which tab is active
  const emailTab=document.getElementById('mt-email');
  if(emailTab&&!emailTab.classList.contains('active')){swMsgTab('email');toast('Switched to Email tab — fill in To and send','info');return}
  const to=document.getElementById('email-to')?.value.trim();
  const subj=document.getElementById('email-subj')?.value.trim();
  const body=document.getElementById('email-body')?.value.trim();
  const from=localStorage.getItem('pq_from')||'hello@personaquanta.online';
  if(!to){toast('Add recipient email first','error');swMsgTab('email');return}
  if(!subj||!body){toast('Fill in subject and body','error');return}
  const btn=document.getElementById('bsemail');
  if(btn){btn.disabled=true;btn.textContent='Sending...'}
  try{
    const r=await fetch('https://pq-proxy.personaquanta.workers.dev/send-email',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({from:`Maksym Pozhydaiev <${from}>`,to:[to],subject:subj,text:body})});
    const d=await r.json();
    if(d.id){
      toast('Email sent ✓','success');
      if(currentDraft)currentDraft._emailSent=true;
      // Save contact automatically after sending
      saveContact('sent');
    }else toast('Failed: '+(d.message||JSON.stringify(d)),'error');
  }catch(e){toast('Error: '+e.message,'error')}
  finally{if(btn){btn.disabled=false;btn.textContent='✉ Send Email'}}
}

window.saveContact = function saveContact(forceStatus){
  if(!currentDraft){toast('No contact to save','error');return}
  const status=forceStatus||document.getElementById('r-status')?.value||'new';
  const c={
    id:Date.now(),
    n:document.getElementById('r-name')?.value||currentDraft.name||'Unknown',
    co:document.getElementById('r-co')?.value||currentDraft.company||'',
    em:document.getElementById('r-email')?.value||currentDraft.email||'',
    url:document.getElementById('r-url')?.value||currentDraft.linkedin_url||'',
    fit:+document.getElementById('r-fit')?.value||currentDraft.fit||0,
    nt:document.getElementById('r-notes')?.value||currentDraft.angle||'',
    st:status,
    dt:new Date().toISOString().slice(0,10),
    log:[{d:new Date().toISOString().slice(0,10),t:`Contact added. Status: ${ST[status]?.l||status}`,s:status}],
    ptxt:currentDraft.profileText||'',
  };
  // Add DM/email to log if sent
  if(currentDraft._dmSent)c.log.push({d:c.dt,t:'LinkedIn DM copied and sent',s:'sent'});
  if(currentDraft._emailSent)c.log.push({d:c.dt,t:`Email sent: "${currentDraft.email_subject||''}"`,s:'sent'});
  contacts.unshift(c);
  save();renderAll();
  selectedId=c.id;
  currentDraft=null;
  selContact(c.id);
  toast('Saved to CRM ✓','success');
}

window.regenerate = function regenerate(id){
  const c=contacts.find(x=>x.id===id);if(!c||!c.ptxt)return;
  document.getElementById('profile-paste') ? null : showPastePanel();
  setTimeout(()=>{
    const ta=document.getElementById('profile-paste');
    if(ta){ta.value=c.ptxt;analyzeProfile()}
  },100);
}

window.updC = function updC(id,field,val){const c=contacts.find(x=>x.id===id);if(!c)return;c[field]=val;if(field==='st'){if(!c.log)c.log=[];c.log.push({d:new Date().toISOString().slice(0,10),t:`Status → ${ST[val]?.l||val}`,s:val});renderList();updateStats()}save()}
window.delC = function delC(id){if(!confirm('Delete?'))return;contacts=contacts.filter(c=>c.id!==id);selectedId=null;document.getElementById('main').innerHTML='<div class="main-empty"><div class="ico">◈</div><p style="font-size:13px">Select a contact</p></div>';save();renderAll()}
